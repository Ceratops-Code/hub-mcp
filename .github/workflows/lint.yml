name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run formatting checks
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Check generated tools list
        run: npm run list-tools:check

      - name: Run MCP smoke test
        run: npm run smoke:mcp

      - name: Build Docker image
        run: npm run docker:build

      - name: Run Docker MCP smoke test
        run: npm run smoke:docker
