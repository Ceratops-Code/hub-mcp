name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run formatting checks
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Check generated tools list
        run: npm run list-tools:check

      - name: Run MCP smoke test
        run: npm run smoke:mcp

      - name: Build Docker image
        run: npm run docker:build

      - name: Run Docker MCP smoke test
        run: npm run smoke:docker
